name: CI Docs

on:
  pull_request:
    branches:
      - main

jobs:
  check-docs:
    name: Documentation Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check documentation updates
        run: |
          CHANGED=$(git diff --name-only origin/main...HEAD)
          HAS_CODE=$(echo "$CHANGED" | grep -E '^(backend|frontend)/' || true)
          HAS_DOCS=$(echo "$CHANGED" | grep -E '^(docs/|README\.md|CHANGELOG\.md)' || true)

          if [ -n "$HAS_CODE" ] && [ -z "$HAS_DOCS" ]; then
            echo "::warning::Code changes detected but no documentation updated."
            echo "::warning::Consider updating docs/, README.md, or CHANGELOG.md."
          fi

          echo "Changed files:"
          echo "$CHANGED"

  markdownlint:
    name: Markdown Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Lint Markdown files
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: |
            README.md
            CHANGELOG.md
            CLAUDE.md
            docs/**/*.md
